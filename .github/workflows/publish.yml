name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: Create or update release PR
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    outputs:
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update release PR
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore(release): version package'
          commit: 'chore(release): version package'
          version: pnpm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch release PR verification
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: gh workflow run ci.yml --ref changeset-release/main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-publish:
    name: Check npm publish state
    if: github.ref == 'refs/heads/main' && needs.version.outputs.has_changesets == 'false'
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check whether package version is already published
        id: check
        run: |
          package_name=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")
          package_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish package
    if: github.ref == 'refs/heads/main' && needs.version.outputs.has_changesets == 'false' && needs.check-publish.outputs.should_publish == 'true'
    needs:
      - version
      - check-publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.3
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
